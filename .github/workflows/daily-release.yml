# 每日自动发布（Daily Release）
# 每天 UTC 0:00 自动构建并发布每日版
# 版本格式：vYYYY.MM.DD.dN

name: Daily Release

on:
  schedule:
    # UTC 0:00 = 北京时间 08:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          DATE=$(date -u +"%Y.%m.%d")
          echo "date=$DATE" >> $GITHUB_OUTPUT

          EXISTING=$(gh api repos/${{ github.repository }}/releases --paginate \
            --jq "[.[] | select(.tag_name | startswith(\"v${DATE}.d\"))] | length" 2>/dev/null || echo "0")

          N=$((EXISTING + 1))
          VERSION="v${DATE}.d${N}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in script
        run: |
          sed -i "s|// 版本：.*|// 版本：${{ steps.version.outputs.version }}|" mihomo-cn-override.js

      - name: Verify script syntax
        run: node --check mihomo-cn-override.js

      - name: Commit version change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mihomo-cn-override.js
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Get changelog
        id: changelog
        run: |
          PREV_TAG=$(gh api repos/${{ github.repository }}/releases --paginate \
            --jq '[.[] | select(.tag_name | test("\\.d\\d+$"))] | .[0].tag_name' 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "null" ]; then
            echo "changelog=Initial release" >> $GITHUB_OUTPUT
          else
            LOG=$(git log ${PREV_TAG}..HEAD --oneline --no-merges | head -20)
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$LOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create versioned release (history)
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --notes "## Daily Build ${{ steps.version.outputs.version }}

          ## What's Changed
          ${{ steps.changelog.outputs.changelog }}

          ---
          > This is an automated daily build. For stable releases, use the \`stable\` tag." \
            mihomo-cn-override.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create / update daily release (auto-update)
        run: |
          cp mihomo-cn-override.js mihomo-cn-override-daily.js
          gh release delete daily --yes --cleanup-tag 2>/dev/null || true
          gh release create daily \
            --title "daily (${{ steps.version.outputs.version }})" \
            --notes "每日构建 ${{ steps.version.outputs.version }}

          ${{ steps.changelog.outputs.changelog }}" \
            --prerelease \
            mihomo-cn-override-daily.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy to daily folder
        run: |
          cp mihomo-cn-override.js daily/mihomo-cn-override-daily.js
          git add daily/
          git diff --cached --quiet || git commit -m "chore: update daily snapshot to ${{ steps.version.outputs.version }}"
          git push
