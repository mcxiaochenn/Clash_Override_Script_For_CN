# 正式版发布（Stable Release）
# 手动触发，发布正式稳定版本并标记为 Latest
# 版本格式：vYYYY.MM.DD.NB（Shanghai 时区，NB 每日重置）

name: Stable Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          DATE=$(TZ=Asia/Shanghai date +"%Y.%m.%d")
          echo "date=$DATE" >> $GITHUB_OUTPUT

          EXISTING=$(gh api repos/${{ github.repository }}/releases --paginate \
            --jq "[.[] | select(.tag_name | startswith(\"v${DATE}.\"))] | length" 2>/dev/null || echo "0")

          NB=$(printf "%02d" $((EXISTING + 1)))
          VERSION="v${DATE}.${NB}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in script
        run: |
          sed -i "s|// 版本：.*|// 版本：${{ steps.version.outputs.version }}|" mihomo-cn-override.js

      - name: Verify script syntax
        run: node --check mihomo-cn-override.js

      - name: Commit version change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mihomo-cn-override.js
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Get changelog
        id: changelog
        run: |
          PREV_TAG=$(gh api repos/${{ github.repository }}/releases --paginate \
            --jq '[.[] | select(.prerelease == false)] | .[0].tag_name' 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "null" ]; then
            echo "changelog=Initial stable release" >> $GITHUB_OUTPUT
          else
            LOG=$(git log ${PREV_TAG}..HEAD --oneline --no-merges | head -20)
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$LOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --notes "## Stable Release ${{ steps.version.outputs.version }}

          ${{ steps.changelog.outputs.changelog }}

          ---
          > 这是正式稳定版本，已标记为 Latest。" \
            --latest \
            mihomo-cn-override.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update build/latest for CDN
        run: |
          mkdir -p build/latest
          cp mihomo-cn-override.js build/latest/mihomo-cn-override-latest.js
          git add build/latest/
          git diff --cached --quiet || git commit -m "chore: update build/latest to ${{ steps.version.outputs.version }}"
          git push
